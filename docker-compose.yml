version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: devboard_postgres
    restart: always
    environment:
      POSTGRES_USER: devboard
      POSTGRES_PASSWORD: devboard123
      POSTGRES_DB: devboard
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: devboard_redis
    restart: always
    ports:
      - '6380:6379'

  app:
    build: .
    container_name: devboard_app
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://devboard:devboard123@postgres:5432/devboard
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
