version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: devboard_postgres
    restart: always
    environment:
      POSTGRES_USER: devboard
      POSTGRES_PASSWORD: devboard123
      POSTGRES_DB: devboard
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: devboard_redis
    restart: always
    ports:
      - '6380:6379'

volumes:
  postgres_data:
